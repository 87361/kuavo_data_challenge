# Task1 real-robot config for the OpenPI pi0.5 LoRA checkpoint trained on 50 episodes.
hydra:
  run:
    dir: ./outputs/kuavo_deploy_hydra_save/singlerun/${now:%Y%m%d_%H%M%S}
  sweep:
    dir: ./outputs/kuavo_deploy_hydra_save/multirun/${now:%Y%m%d_%H%M%S}
    subdir: ${hydra:job.override_dirname}

env:
  env_name: Kuavo-Real
  control_mode: joint
  eef_type: leju_claw
  which_arm: both
  head_init: null
  ros_rate: 10
  only_arm: true
  image_size: &IMGSIZE [848, 480]
  obs_key_map:
    head_cam_h: ["/cam_h/color/image_raw/compressed", "CompressedImage", 30, *IMGSIZE]
    wrist_cam_l: ["/cam_l/color/image_raw/compressed", "CompressedImage", 30, *IMGSIZE]
    wrist_cam_r: ["/cam_r/color/image_raw/compressed", "CompressedImage", 30, *IMGSIZE]
    joint_q: ["/sensors_data_raw", "sensorsData", 500]
    leju_claw: ["/leju_claw_state", "lejuClawState", 500]
  arm_state_keys: ["joint_q", "gripper"]
  frame_alignment: false
  ratio: 1.0
  limits:
    joint_q:
      min: [-3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14]
      max: [3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14]
    gripper:
      min: [0, 0]
      max: [1, 1]
    eef:
      min: [-1, -1, -1, -3.14, -3.14, -3.14, -1, -1, -1, -3.14, -3.14, -3.14]
      max: [1, 1, 1, 3.14, 3.14, 3.14, 1, 1, 1, 3.14, 3.14, 3.14]
    eef_relative:
      min: [-0.005, -0.0075, -0.004, -0.03, -0.03, -0.05, -0.005, -0.0075, -0.004, -0.03, -0.03, -0.05]
      max: [0.005, 0.0075, 0.004, 0.03, 0.03, 0.05, 0.005, 0.0075, 0.004, 0.03, 0.03, 0.05]
    base:
      min: [-2.0, -2.0, -3.14, 0]
      max: [2.0, 2.0, 3.14, 1]
  qiangnao_dof_needed: 1
  is_binary: false

inference:
  go_bag_path: ""
  policy_type: openpi
  eval_episodes: 1
  seed: 42
  start_seed: 42
  device: cuda
  task: task1_zhuomian
  method: pi05_lora_real50
  timestamp: step5000_20260623
  epoch: 5000
  max_episode_steps: 2000
  checkpoint_path: outputs/openpi/pi05_kuavo_task1_zhuomian_50_lora/5000

  openpi_config_name: pi05_kuavo_task1_zhuomian_50_lora
  openpi_prompt: "Task1 Desktop Parts Pick And Place"
  openpi_server_host: 127.0.0.1
  openpi_server_port: 8000
  openpi_python: ""
  openpi_auto_start: true
  openpi_cuda_visible_devices: ""
  openpi_action_horizon: 50
  openpi_state_dim: 16
  openpi_image_width: 848
  openpi_image_height: 480
  openpi_warmup_steps: 2
  openpi_connect_timeout_s: 180.0
