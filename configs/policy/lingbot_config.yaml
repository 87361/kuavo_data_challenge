hydra:
  run:
    dir: ./outputs/train_hydra_save/singlerun/${now:%Y%m%d_%H%M%S}
  sweep:
    dir: ./outputs/train_hydra_save/multirun/${now:%Y%m%d_%H%M%S}
    subdir: ${hydra:job.override_dirname}

task: "lingbot_task"
method: "lingbot_post_train"
timestamp: ${now:%Y%m%d_%H%M%S}
repoid: "lerobot/${task}"
root: /home/yunxi/lmy/VLA/huggingface/lerobot/pick_and_place0_4_2

training:
  output_directory: "outputs/train/${task}/${method}"
  seed: 42
  max_epoch: 1
  save_freq_epoch: 1
  log_freq: 1
  checkpoint_save_freq_steps: null
  device: "cuda"
  gpu_ids: [0]
  accumulation_steps: 1
  batch_size: 1
  num_workers: 4
  drop_last: false
  max_training_step: null
  resume: false  #The single right arm movement dimension has been corrected to 8; do not continue to train the old 14-dimensional mismatch run
  resume_timestamp: ""
  RGB_Augmenter:
    enable: false

#Key: Offload to LingBot launcher via policy_name=lingbot
policy_name: lingbot

policy:
  _target_: kuavo_train.wrapper.policy.lingbot.LingbotConfigWrapper.CustomLingbotConfigWrapper

  #Startup parameters (handled by kuavo_train/wrapper/policy/lingbot)
  lingbot_root: ""  #Automatically find or use environment variable LINGBOT_ROOT when empty
  lerobot_root: ""  #If left blank, use lerobot from the current environment
  train_entry: "kuavo_train/lingbot/tasks/vla/train_lingbotvla.py"
  config_path: "configs/policy/lingbot/robotwin_load20000h.yaml"

  #Model path (will be converted to --model.* parameters passed to the LingBot script)
  model_path: /home/yunxi/lmy/VLA/lingbot-vla-4b
  tokenizer_path: /home/yunxi/lmy/VLA/Qwen2.5-VL-3B-Instruct
  # moge_path: /path/to/moge2-vitb-normal
  # morgbd_path: /path/to/LingBot-Depth-Pretrained

  #Optional: Additional parameters passed directly to the LingBot training entrance
  extra_args: []
  env:
    CUDA_VISIBLE_DEVICES: "0, 1, 2, 3, 4, 5, 6, 7"

  #Debugging: Only print torchrun command, not actual execution
  dry_run: false
