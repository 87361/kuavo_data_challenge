hydra:
  run:
    dir: ./outputs/train_hydra_save/singlerun/${now:%Y%m%d_%H%M%S}
  sweep:
    dir: ./outputs/train_hydra_save/multirun/${now:%Y%m%d_%H%M%S}
    subdir: ${hydra:job.override_dirname}

task: "lingbot_task"
method: "lingbot_post_train"
timestamp: ${now:%Y%m%d_%H%M%S}
repoid: "lerobot/${task}"
root: /home/yunxi/lmy/VLA/huggingface/lerobot/pick_and_place0_4_2

training:
  output_directory: "outputs/train/${task}/${method}"
  seed: 42
  max_epoch: 1
  save_freq_epoch: 1
  log_freq: 1
  checkpoint_save_freq_steps: null
  device: "cuda"
  gpu_ids: [0]
  accumulation_steps: 1
  batch_size: 1
  num_workers: 4
  drop_last: false
  max_training_step: null
  resume: false  # 单右臂动作维度已修正为 8；不要续训旧的 14 维错配 run
  resume_timestamp: ""
  RGB_Augmenter:
    enable: false

# 关键：通过 policy_name=lingbot 分流到 LingBot 启动器
policy_name: lingbot

policy:
  _target_: kuavo_train.wrapper.policy.lingbot.LingbotConfigWrapper.CustomLingbotConfigWrapper

  # 启动参数（由 kuavo_train/wrapper/policy/lingbot 处理）
  lingbot_root: ""  # 为空时自动查找或使用环境变量 LINGBOT_ROOT
  lerobot_root: ""  # 留空时使用当前环境中的 lerobot
  train_entry: "kuavo_train/lingbot/tasks/vla/train_lingbotvla.py"
  config_path: "configs/policy/lingbot/robotwin_load20000h.yaml"

  # 模型路径（会转换为 --model.* 参数传递给 LingBot 脚本）
  model_path: /home/yunxi/lmy/VLA/lingbot-vla-4b
  tokenizer_path: /home/yunxi/lmy/VLA/Qwen2.5-VL-3B-Instruct
  # moge_path: /path/to/moge2-vitb-normal
  # morgbd_path: /path/to/LingBot-Depth-Pretrained

  # 可选：额外直传给 LingBot 训练入口的参数
  extra_args: []
  env:
    CUDA_VISIBLE_DEVICES: "0, 1, 2, 3, 4, 5, 6, 7"

  # 调试：仅打印 torchrun 命令，不实际执行
  dry_run: false
