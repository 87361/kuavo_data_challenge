model:
  model_path: /path/to/LingBot-VLA
  tokenizer_path: /path/to/Qwen2.5-VL-3B-Instruct/
  post_training: true
  adanorm_time: true
  old_adanorm: true

data:
  datasets_type: vla
  data_name: custom_pick_and_place_right_arm
  train_path: /home/yunxi/lmy/VLA/huggingface/lerobot/pick_and_place
  num_workers: 8
  norm_type: bounds_99_woclip
  norm_stats_file: assets/norm_stats/pick_and_place0_4_2.json

train:
  output_dir: /path/to/lingbot_robotwin5tasks/
  loss_type: L1_fm
  data_parallel_mode: fsdp2
  enable_full_shard: false
  module_fsdp_enable: true
  use_compile: true
  use_wandb: false
  rmpad: false
  rmpad_with_pos_ids: false
  ulysses_parallel_size: 1
  freeze_vision_encoder: false
  tokenizer_max_length: 24
  action_dim: 8
  max_action_dim: 75
  max_state_dim: 75
  lr: 1.0e-4
  lr_decay_style: constant
  num_train_epochs: 60
  micro_batch_size: 16
  global_batch_size: 128
  max_steps: 220000
  ckpt_manager: dcp
  save_steps: 220000
  save_epochs: 20
  enable_fp32: true
  enable_resume: true
